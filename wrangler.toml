name = "product-og-metadata"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Automatically compile TypeScript
build = { command = "npm install typescript @cloudflare/workers-types --save-dev && npx tsc", watch_dir = "src" }

# Fill in your Cloudflare Account ID and Zone ID below
# You can find these in the Cloudflare Dashboard overview page for your domain
account_id = "YOUR_ACCOUNT_ID_HERE"

[[routes]]
pattern = "spicorpinvest.com/*"
zone_id = "YOUR_ZONE_ID_HERE"

# The following secrets must be set via `wrangler secret put <NAME>`:
# - SUPABASE_URL
# - SUPABASE_ANON_KEY