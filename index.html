        <!-- Dynamic OG Tag Injection for Crawlers -->
        <script>
            (function() {
                var params = new URLSearchParams(window.location.search);
                var productId = params.get('product') || params.get('id');
                
                if (productId) {
                    var titleMeta = document.createElement('meta');
                    titleMeta.setAttribute('property', 'og:title');
                    titleMeta.setAttribute('content', 'Produit | SPI Corporate Invest');
                    document.head.appendChild(titleMeta);
                    
                    var urlMeta = document.createElement('meta');
                    urlMeta.setAttribute('property', 'og:url');
                    urlMeta.setAttribute('content', window.location.href);
                    document.head.appendChild(urlMeta);
                    
                    var typeMeta = document.createElement('meta');
                    typeMeta.setAttribute('property', 'og:type');
                    typeMeta.setAttribute('content', 'product');
                    document.head.appendChild(typeMeta);
                }
            })();
        </script>
